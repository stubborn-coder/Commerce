{% extends "auctions/layout.html" %}

{% block body %}

    {% if message %}
    <div>{{ message }}</div>
    {% endif %}

    <h2>Create Listings</h2>

    <form action="{% url 'create' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input autofocus class="form-control" type="text" name="name" placeholder="Name" required>
        </div>
        <div class="form-group">
            <input class="form-control" type="text" name="description" placeholder="description" required>
        </div>

        <div class="form-group">
            <input class="form-control" type="number" name="starting_bid" placeholder="Starting Bid" required>
        </div>

        <div class="form-group">
            <input class="form-control" type="url" name="image" placeholder="Image" required>
        </div>

        <input class="btn btn-primary" type="submit" value="Submit">
    </form>

    
{% endblock %}
